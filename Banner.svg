  <!-- Name -->
  <text x="80" y="120" font-family="Segoe UI, Arial, sans-serif" font-size="52" fill="#ffffff" font-weight="bold">Suraj Maitra</text>
  
  <!-- Title -->
  <text x="80" y="170" font-family="Segoe UI, Arial, sans-serif" font-size="26" fill="#00d9ff" font-weight="600">Cloud &amp; DevOps Engineer</text>

  <!-- Separator -->
  <rect x="80" y="190" width="120" height="3" rx="2" fill="url(#accent2)"/>

  <!-- Description -->
  <text x="80" y="230" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#8b949e">Building &amp; Scaling Real Production Systems on AWS</text>
  <text x="80" y="258" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#8b949e">4 Live Services  |  Docker  |  Kubernetes  |  Terraform  |  CI/CD</text>

  <!-- Tags -->
  <rect x="80" y="285" width="90" height="30" rx="15" fill="#00d9ff" fill-opacity="0.12" stroke="#00d9ff" stroke-width="1"/>
  <text x="125" y="305" font-family="Arial, sans-serif" font-size="12" fill="#00d9ff" text-anchor="middle">srjahir.in</text>
  
  <rect x="180" y="285" width="80" height="30" rx="15" fill="#0078d4" fill-opacity="0.12" stroke="#0078d4" stroke-width="1"/>
  <text x="220" y="305" font-family="Arial, sans-serif" font-size="12" fill="#0078d4" text-anchor="middle">GitHub</text>
  
  <rect x="270" y="285" width="85" height="30" rx="15" fill="#0a66c2" fill-opacity="0.12" stroke="#0a66c2" stroke-width="1"/>
  <text x="312" y="305" font-family="Arial, sans-serif" font-size="12" fill="#0a66c2" text-anchor="middle">LinkedIn</text>

  <rect x="365" y="285" width="70" height="30" rx="15" fill="#f7c948" fill-opacity="0.12" stroke="#f7c948" stroke-width="1"/>
  <text x="400" y="305" font-family="Arial, sans-serif" font-size="12" fill="#f7c948" text-anchor="middle">Rajkot</text>

  <!-- Quote -->
  <text x="80" y="360" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#58a6ff" font-style="italic">"I don't just learn DevOps — I run real systems in production."</text>

  <!-- Bottom accent line -->
  <rect x="0" y="397" width="1200" height="3" fill="url(#accent)"/>
