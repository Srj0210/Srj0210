  <circle cx="150" cy="350" r="100" fill="none" stroke="#0078d4" stroke-width="1" opacity="0.08"/>
  <circle cx="150" cy="350" r="60" fill="none" stroke="#0078d4" stroke-width="1" opacity="0.12"/>

