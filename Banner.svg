  <line x1="1000" y1="205" x2="1020" y2="240" stroke="#00d9ff" stroke-width="0.5" opacity="0.3"/>
  <line x1="1045" y1="180" x2="1045" y2="130" stroke="#00d9ff" stroke-width="0.5" opacity="0.3"/>
  <line x1="930" y1="275" x2="950" y2="290" stroke="#00d9ff" stroke-width="0.5" opacity="0.3"/>

