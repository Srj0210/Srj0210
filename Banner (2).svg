<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 350" width="1000" height="350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090d11" />
      <stop offset="100%" stop-color="#161b22" />
    </linearGradient>

    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg)" />

  <g stroke="#ffffff" stroke-opacity="0.02" stroke-width="1">
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <rect width="30" height="30" fill="none" />
      <path d="M 30 0 L 0 0 0 30" />
    </pattern>
    <rect width="100%" height="100%" fill="url(#grid)" />
  </g>

  <g transform="translate(60, 95)">
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="#f8fafc" letter-spacing="-1">Suraj Maitra</text>
    
    <text x="0" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="600" fill="url(#accent)" letter-spacing="0.5">Cloud &amp; DevOps Engineer</text>
    
    <rect x="0" y="55" width="50" height="3" rx="1.5" fill="#3b82f6" />

    <text x="0" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="400" fill="#94a3b8">Architecting highly available cloud infrastructure &amp; CI/CD pipelines.</text>
    
    <g transform="translate(0, 115)" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#cbd5e1">
      <text x="0" y="0">Stack <tspan fill="#475569" font-weight="400">|</tspan> AWS • Kubernetes • Docker • Terraform • Python • Linux</text>
    </g>

    <g transform="translate(0, 160)" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500">
      <rect x="0" y="0" width="95" height="32" rx="16" fill="#0d1117" stroke="#38bdf8" stroke-width="1.5" />
      <text x="47.5" y="20.5" fill="#38bdf8" text-anchor="middle">srjahir.in</text>

      <rect x="110" y="0" width="85" height="32" rx="16" fill="#0d1117" stroke="#8b949e" stroke-width="1.5" />
      <text x="152.5" y="20.5" fill="#e2e8f0" text-anchor="middle">GitHub</text>

      <rect x="210" y="0" width="95" height="32" rx="16" fill="#0d1117" stroke="#0a66c2" stroke-width="1.5" />
      <text x="257.5" y="20.5" fill="#58a6ff" text-anchor="middle">LinkedIn</text>
    </g>
  </g>

  <g stroke="#30363d" stroke-width="2" fill="none">
    <path d="M 750 175 L 650 120" /> <path d="M 750 175 L 850 100" /> <path d="M 750 175 L 640 240" /> <path d="M 750 175 L 880 230" /> <path d="M 750 175 L 920 175" /> <path d="M 750 175 L 780 270" /> <circle cx="750" cy="175" r="140" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1" stroke-dasharray="4 6" />
    <circle cx="750" cy="175" r="220" stroke="#ffffff" stroke-opacity="0.015" stroke-width="1" />
  </g>

  <g transform="translate(710, 135)" filter="url(#glow)">
    <rect x="0" y="0" width="80" height="80" rx="18" fill="#161b22" stroke="#2496ED" stroke-width="1.5" />
    <image href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/docker/docker-original.svg" x="15" y="15" width="50" height="50" />
  </g>

  <g transform="translate(620, 90)">
    <rect x="0" y="0" width="60" height="60" rx="14" fill="#161b22" stroke="#30363d" stroke-width="1" />
    <image href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/amazonwebservices/amazonwebservices-original-wordmark.svg" x="10" y="10" width="40" height="40" />
  </g>

  <g transform="translate(820, 70)">
    <rect x="0" y="0" width="60" height="60" rx="14" fill="#161b22" stroke="#30363d" stroke-width="1" />
    <image href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/kubernetes/kubernetes-plain.svg" x="10" y="10" width="40" height="40" />
  </g>

  <g transform="translate(900, 145)">
    <rect x="0" y="0" width="60" height="60" rx="14" fill="#161b22" stroke="#30363d" stroke-width="1" />
    <image href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/terraform/terraform-original.svg" x="10" y="10" width="40" height="40" />
  </g>

  <g transform="translate(610, 215)">
    <rect x="0" y="0" width="60" height="60" rx="14" fill="#161b22" stroke="#30363d" stroke-width="1" />
    <image href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/linux/linux-original.svg" x="10" y="10" width="40" height="40" />
  </g>

  <g transform="translate(750, 245)">
    <rect x="0" y="0" width="60" height="60" rx="14" fill="#161b22" stroke="#30363d" stroke-width="1" />
    <image href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/python/python-original.svg" x="10" y="10" width="40" height="40" />
  </g>

</svg>
